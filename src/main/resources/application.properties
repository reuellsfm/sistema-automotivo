spring.application.name=sistema-automotivo

# ===============================
# Banco de dados - MySQL
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/sistema_automotivo?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / Hibernate
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ===============================
# Carrega dados iniciais (data.sql) somente apos JPA criar as tabelas
# ===============================
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true

# ===============================
# Servidor
# ===============================
server.port=8080
server.servlet.context-path=/

# ===============================
# Logs
# ===============================
logging.level.org.hibernate.SQL=INFO
logging.level.com.unifecaf.sistemaautomotivo=DEBUG
