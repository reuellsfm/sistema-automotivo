<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Automotivo - Gestao de Estoque</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="topbar">
    <div class="container topbar-inner">
        <h1>Sistema Automotivo</h1>
        <span class="subtitle">Gestao de Estoque de Veiculos</span>
    </div>
</header>

<main class="container">

    <section class="cards-resumo">
        <div class="card"><span class="card-label">Total</span><span id="resumo-total" class="card-valor">0</span></div>
        <div class="card disponivel"><span class="card-label">Disponiveis</span><span id="resumo-disponivel" class="card-valor">0</span></div>
        <div class="card reservado"><span class="card-label">Reservados</span><span id="resumo-reservado" class="card-valor">0</span></div>
        <div class="card vendido"><span class="card-label">Vendidos</span><span id="resumo-vendido" class="card-valor">0</span></div>
    </section>

    <section class="bloco">
        <div class="bloco-header">
            <h2>Cadastro rapido</h2>
            <div class="tabs">
                <button class="tab active" data-tab="veiculo">Veiculo</button>
                <button class="tab" data-tab="modelo">Modelo</button>
                <button class="tab" data-tab="marca">Marca</button>
            </div>
        </div>

        <form id="form-veiculo" class="form-grid">
            <div class="campo">
                <label>Marca</label>
                <select id="filtro-marca-form" required></select>
            </div>
            <div class="campo">
                <label>Modelo</label>
                <select id="modelo-form" required></select>
            </div>
            <div class="campo">
                <label>Ano</label>
                <input type="number" id="ano" min="1950" max="2100" required>
            </div>
            <div class="campo">
                <label>Cor</label>
                <input type="text" id="cor" maxlength="30" required>
            </div>
            <div class="campo">
                <label>Preco (R$)</label>
                <input type="number" id="preco" step="0.01" min="0" required>
            </div>
            <div class="campo">
                <label>Quilometragem</label>
                <input type="number" id="quilometragem" min="0" required>
            </div>
            <div class="campo">
                <label>Status</label>
                <select id="status-form">
                    <option value="DISPONIVEL">Disponivel</option>
                    <option value="RESERVADO">Reservado</option>
                    <option value="VENDIDO">Vendido</option>
                </select>
            </div>
            <div class="campo acoes-form">
                <input type="hidden" id="veiculo-id">
                <button type="submit" class="btn primario">Salvar veiculo</button>
                <button type="button" id="btn-cancelar" class="btn secundario hidden">Cancelar</button>
            </div>
        </form>

        <form id="form-modelo" class="form-grid hidden">
            <div class="campo">
                <label>Nome do modelo</label>
                <input type="text" id="modelo-nome" maxlength="80" required>
            </div>
            <div class="campo">
                <label>Categoria</label>
                <select id="modelo-categoria">
                    <option value="">--</option>
                    <option value="SEDAN">Sedan</option>
                    <option value="HATCH">Hatch</option>
                    <option value="SUV">SUV</option>
                    <option value="PICKUP">Pickup</option>
                    <option value="COUPE">Coupe</option>
                    <option value="UTILITARIO">Utilitario</option>
                </select>
            </div>
            <div class="campo">
                <label>Marca</label>
                <select id="modelo-marca" required></select>
            </div>
            <div class="campo acoes-form">
                <button type="submit" class="btn primario">Cadastrar modelo</button>
            </div>
        </form>

        <form id="form-marca" class="form-grid hidden">
            <div class="campo">
                <label>Nome da marca</label>
                <input type="text" id="marca-nome" maxlength="80" required>
            </div>
            <div class="campo">
                <label>Pais de origem</label>
                <input type="text" id="marca-pais" maxlength="50">
            </div>
            <div class="campo acoes-form">
                <button type="submit" class="btn primario">Cadastrar marca</button>
            </div>
        </form>
    </section>

    <section class="bloco">
        <div class="bloco-header">
            <h2>Estoque de veiculos</h2>
        </div>

        <div class="filtros">
            <div class="campo">
                <label>Marca</label>
                <select id="filtro-marca"><option value="">Todas</option></select>
            </div>
            <div class="campo">
                <label>Modelo</label>
                <select id="filtro-modelo"><option value="">Todos</option></select>
            </div>
            <div class="campo">
                <label>Status</label>
                <select id="filtro-status">
                    <option value="">Todos</option>
                    <option value="DISPONIVEL">Disponivel</option>
                    <option value="RESERVADO">Reservado</option>
                    <option value="VENDIDO">Vendido</option>
                </select>
            </div>
            <div class="campo">
                <label>Preco minimo</label>
                <input type="number" id="filtro-preco-min" min="0" step="0.01">
            </div>
            <div class="campo">
                <label>Preco maximo</label>
                <input type="number" id="filtro-preco-max" min="0" step="0.01">
            </div>
            <div class="campo">
                <label>Ano minimo</label>
                <input type="number" id="filtro-ano-min" min="1950" max="2100">
            </div>
            <div class="campo acoes-filtros">
                <button id="btn-filtrar" class="btn primario">Filtrar</button>
                <button id="btn-limpar" class="btn secundario">Limpar</button>
            </div>
        </div>

        <div class="tabela-wrapper">
            <table>
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Marca</th>
                    <th>Modelo</th>
                    <th>Ano</th>
                    <th>Cor</th>
                    <th>KM</th>
                    <th>Preco</th>
                    <th>Status</th>
                    <th class="col-acoes">Acoes</th>
                </tr>
                </thead>
                <tbody id="tabela-veiculos"></tbody>
            </table>
        </div>
    </section>
</main>

<div id="toast" class="toast hidden"></div>

<script src="js/app.js"></script>
</body>
</html>
